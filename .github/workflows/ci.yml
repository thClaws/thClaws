name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Formatting check — fast, runs on every PR
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - working-directory: crates/core
        run: cargo fmt --all -- --check

  # Frontend build + typecheck (needs to run before clippy/test so frontend/dist exists)
  frontend:
    name: frontend typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - working-directory: frontend
        run: pnpm install --frozen-lockfile
      - working-directory: frontend
        run: pnpm tsc --noEmit
      - working-directory: frontend
        run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # Clippy lint (requires frontend/dist/index.html from include_str!)
  clippy:
    name: cargo clippy
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/core
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - working-directory: crates/core
        # Warnings logged but not fatal — cleanup tracked separately from launch
        run: cargo clippy --features gui

  # Test matrix across major platforms
  test:
    name: test (${{ matrix.os }})
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/core
      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - working-directory: crates/core
        run: cargo build --features gui
      - working-directory: crates/core
        run: cargo test --features gui
        env:
          THCLAWS_DISABLE_KEYCHAIN: "1"
