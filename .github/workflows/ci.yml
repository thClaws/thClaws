name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt into Node 24 ahead of GitHub's 2026-06-02 forced switch, so we
  # catch action-runtime breakage on our schedule, not theirs. Drop this
  # once Node 24 is the runner default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Least privilege: CI only needs to read the repo + download the
# frontend-dist artifact between jobs. Override per-job if a future
# step needs more (e.g. caching a coverage upload).
permissions:
  contents: read
  actions: read

jobs:
  # Formatting check — fast, runs on every PR
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Frontend build + typecheck (needs to run before clippy/test so frontend/dist exists)
  frontend:
    name: frontend typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - working-directory: frontend
        run: pnpm install --frozen-lockfile
      - working-directory: frontend
        run: pnpm tsc --noEmit
      - working-directory: frontend
        run: pnpm build
      - uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # Clippy lint (requires frontend/dist/index.html from include_str!)
  clippy:
    name: cargo clippy
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
      # Warnings logged but not fatal — cleanup tracked separately from launch
      - run: cargo clippy --features gui

  # Test matrix across major platforms
  test:
    name: test (${{ matrix.os }})
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows tests use Unix-only path assumptions in several places;
        # platform coverage on Windows comes from the Release workflow
        # (which builds the binary successfully on windows-latest / -11-arm).
        # TODO: add Windows back when tests are hardened for path separators.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
      - run: cargo build --features gui
      - run: cargo test --features gui
        env:
          THCLAWS_DISABLE_KEYCHAIN: "1"
